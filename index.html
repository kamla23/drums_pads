<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drumms</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Drumms 🥁</h1>

<div class="container">

<div class="pad" data-key="a">
<h2>A</h2>
<p>Kick</p>
</div>

<div class="pad" data-key="s">
<h2>S</h2>
<p>Snare</p>
</div>

<div class="pad" data-key="q">
<h2>Q</h2>
<p>Closed Hat</p>
</div>

<div class="pad" data-key="w">
<h2>W</h2>
<p>Open Hat</p>
</div>

<div class="pad" data-key="d">
<h2>D</h2>
<p>Tom 1</p>
</div>

<div class="pad" data-key="f">
<h2>F</h2>
<p>Tom 2</p>
</div>

<div class="pad" data-key="e">
<h2>E</h2>
<p>Cymbal</p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
